<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snap your pictures — snap & co.</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/camera.css" />
</head>
<body>
  <div class="timer-container">
    <select id="cameraSelect" class="camera-select" title="Choose camera source"></select>

    <div class="main-title" id="mainTitle">Snap your pictures</div>
    <div class="subtitle" id="subtitle">Do your best shots, there's no retake</div>

    <div id="frame" class="frame">
      <video id="live-video" autoplay muted playsinline></video>
      <img id="freeze-frame" alt="">
      <div id="countdown">10</div>
      <button id="startBtn" class="pill-btn start-btn">start capturing →</button>
    </div>

    <div id="shots-counter">Get Ready!</div>
  </div>

<script src="js/state.js"></script>
<script src="js/camera.js"></script>
</body>
</html>
