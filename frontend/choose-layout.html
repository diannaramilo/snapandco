<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Choose your frame — snap & co.</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/modal.css" />
<link rel="stylesheet" href="css/choose-layout.css" />
</head>
<body>
  <button class="pill-btn fixed-back" id="backBtn">←retake</button>

  <div class="page-header">
    <h1>Choose your frame</h1>
    <p>select a style for your photos</p>
  </div>

  <button class="pill-btn fixed-next" id="nextBtn">next →</button>

  <div class="picker-area">
    <div class="live-preview-wrap">
      <div class="live-preview" id="livePreview">
        <div id="preview-shots"></div>
        <img id="preview-frame-overlay" src="" alt="Frame preview">
      </div>
    </div>

    <div class="frame-carousel">
      <button class="arrow-btn" id="prevFrame" aria-label="Previous frames">
        <svg width="14" height="24" viewBox="0 0 14 24" fill="none"><path d="M12 2L2 12L12 22" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <div class="frame-page" id="framePage"></div>

      <button class="arrow-btn" id="nextFrameBtn" aria-label="Next frames">
        <svg width="14" height="24" viewBox="0 0 14 24" fill="none"><path d="M2 2L12 12L2 22" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

<script src="js/state.js"></script>
<script src="js/modal.js"></script>
<script src="js/strip-render.js"></script>
<script src="js/choose-layout.js"></script>
</body>
</html>
