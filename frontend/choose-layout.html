<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Choose your frame — snap & co.</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/choose-layout.css" />
</head>
<body class="page-fade">

  <button class="btn btn-outline top-back" id="backBtn">← retake</button>

  <main class="layout-page">
    <h1>Choose your frame</h1>
    <p class="subtitle">select a style for your photos</p>

    <div class="layout-split">
      <div class="photos-column" id="photosColumn"></div>

      <div class="frame-gallery">
        <button class="arrow" id="scrollLeft" aria-label="scroll left">‹</button>
        <div class="frame-row" id="frameRow"></div>
        <button class="arrow" id="scrollRight" aria-label="scroll right">›</button>
      </div>
    </div>

    <button id="nextBtn" class="btn btn-primary layout-next" disabled>next →</button>
  </main>

<script src="js/state.js"></script>
<script src="js/transition.js"></script>
<script src="js/strip-render.js"></script>
<script src="js/choose-layout.js"></script>
</body>
</html>
