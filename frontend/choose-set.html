<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Choose your set — snap & co.</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/choose-set.css" />
</head>
<body>
  <button class="pill-btn fixed-back" id="backBtn">← back</button>

  <div class="container">
    <div class="page-header">
      <h1>Choose your set</h1>
      <p>pick your favorite set</p>
    </div>

    <div class="sets-row">
      <!-- Set 1: two full 2x6 strips -->
      <div class="set-card" data-set="1">
        <div class="set-preview two-strip">
          <img src="assets/frames/a1.png" class="strip strip-a" alt="">
          <img src="assets/frames/d1.png" class="strip strip-b" alt="">
        </div>
        <div class="set-label">set 1</div>
      </div>

      <!-- Set 2: one 2x6 strip + four 1x3 minis -->
      <div class="set-card" data-set="2">
        <div class="set-preview quad-strip">
          <img src="assets/frames/b1.png" class="strip strip-main" alt="">
          <div class="minis">
            <img src="assets/frames/a2.png" class="mini" alt="">
            <img src="assets/frames/c1.png" class="mini" alt="">
            <img src="assets/frames/c2.png" class="mini" alt="">
            <img src="assets/frames/d2.png" class="mini" alt="">
          </div>
        </div>
        <div class="set-label">set 2</div>
      </div>
    </div>
  </div>

  <button class="pill-btn fixed-next" id="nextBtn">next →</button>

<script src="js/state.js"></script>
<script src="js/choose-set.js"></script>
</body>
</html>
